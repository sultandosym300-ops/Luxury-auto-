kind = "web"
previewPath = "/"
title = "BLACKLINE AUTO STUDIO"
version = "1.0.0"
id = "artifacts/blackline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21525

[services.development]
run = "pnpm --filter @workspace/blackline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blackline", "run", "build" ]
publicDir = "artifacts/blackline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21525"
BASE_PATH = "/"
